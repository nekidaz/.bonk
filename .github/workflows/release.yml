name: Release

# Build signed macOS + Linux + Windows bundles and attach them to a GitHub
# Release when a version tag is pushed, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
#
# The bundles are UNSIGNED by Apple/Microsoft (Gatekeeper/SmartScreen will warn
# on first open), but they ARE signed with the Tauri updater key so the in-app
# auto-updater can verify and install them. tauri-action also publishes a
# `latest.json` update manifest, merged across both platforms.
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY           contents of the updater private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password ("" if generated without one)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: --bundles nsis
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            file

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      # Cache cargo registry + target/ per platform so warm runs skip recompiling
      # all dependencies (cold first run still pays full cost).
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # linuxdeploy/AppImage needs FUSE, which CI runners lack — extract instead of mount.
          APPIMAGE_EXTRACT_AND_RUN: 1
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'bonk ${{ github.ref_name }}'
          releaseBody: 'See [CHANGELOG.md](https://github.com/nekidaz/.bonk/blob/main/CHANGELOG.md) for details.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
